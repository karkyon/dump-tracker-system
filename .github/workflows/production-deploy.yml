name: 🚀 Deploy to Production

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: 'Type "DEPLOY" to confirm production deployment'
        required: true

jobs:
  deploy-production:
    name: 🏭 Deploy to Production Environment
    runs-on: ubuntu-latest
    
    steps:
      - name: ⚠️ Verify deployment confirmation
        run: |
          if [ "${{ github.event.inputs.confirmation }}" != "DEPLOY" ]; then
            echo "❌ Deployment cancelled: confirmation word not matched"
            exit 1
          fi
          echo "✅ Deployment confirmed"
      
      # ===========================
      # 📸 GCP認証とスナップショット作成
      # ===========================
      - name: 🔐 Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      
      - name: 🔧 Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1
      
      - name: 📸 Create Pre-Deployment Snapshot
        run: |
          DATE=$(date +%Y%m%d-%H%M%S)
          SNAPSHOT_NAME="prod-pre-deploy-${DATE}"
          
          echo "📸 Creating pre-deployment snapshot: $SNAPSHOT_NAME"
          
          gcloud compute disks snapshot dump-tracker-vm-prod-v2 \
            --snapshot-names=$SNAPSHOT_NAME \
            --zone=us-west1-b \
            --description="Pre-deployment snapshot - $(date '+%Y-%m-%d %H:%M:%S')" \
            --project=${{ secrets.GCP_PROJECT_ID }}
          
          echo "✅ Snapshot created successfully: $SNAPSHOT_NAME"
          echo "🔗 Snapshot can be used for rollback if needed"
      
      - name: 📥 Checkout code
        uses: actions/checkout@v3
      
      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      # ===========================
      # Backend デプロイ
      # ===========================
      - name: 📦 Install backend dependencies
        working-directory: ./backend
        run: npm ci
      
      - name: 🏗️ Build backend
        working-directory: ./backend
        run: npm run build
      
      - name: 🚀 Deploy backend to Production
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_PRIVATE_KEY }}
          source: "backend/dist/*,backend/package*.json"
          target: "/tmp/backend-deploy/"
          strip_components: 1
      
      - name: 📂 Update backend on Production
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_PRIVATE_KEY }}
          script: |
            cd ~/projects/dump-tracker/backend
            rm -rf dist
            cp -r /tmp/backend-deploy/dist .
            cp /tmp/backend-deploy/package*.json .
            npm ci
            rm -rf /tmp/backend-deploy
            sudo systemctl restart dump-tracker-backend.service
            echo "✅ Backend deployed to Production"

      # ===========================
      # Mobile Frontend デプロイ
      # ===========================
      - name: 📦 Install mobile dependencies
        working-directory: ./frontend/mobile
        run: npm ci
      
      - name: 🔧 Create Production .env.production for Mobile
        working-directory: ./frontend/mobile
        run: |
          cat > .env.production << EOF
          VITE_API_BASE_URL=${{ secrets.PRODUCTION_API_URL }}
          VITE_GOOGLE_MAPS_API_KEY=AIzaSyC1LrD7xMN_sLZ5iELaLpPzXPeQeEoH6pY
          VITE_APP_ENV=production
          EOF
      
      - name: 🏗️ Build mobile app
        working-directory: ./frontend/mobile
        run: |
          mkdir -p .cert
          touch .cert/localhost-key.pem
          touch .cert/localhost-cert.pem
          sed -i 's/useRef<number | null>/useRef<any>/g' src/pages/OperationMain.tsx || true
          npm run build
      
      - name: 🚀 Deploy mobile to Production
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_PRIVATE_KEY }}
          source: "frontend/mobile/dist/*"
          target: "/tmp/mobile-deploy/"
          strip_components: 3
      
      - name: 📂 Update mobile on Production
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_PRIVATE_KEY }}
          script: |
            rm -rf ~/projects/dump-tracker/frontend/mobile/dist/*
            cp -r /tmp/mobile-deploy/* ~/projects/dump-tracker/frontend/mobile/dist/
            chmod -R 755 ~/projects/dump-tracker/frontend/mobile/dist
            rm -rf /tmp/mobile-deploy
            echo "✅ Mobile deployed to Production"

      # ===========================
      # CMS Frontend デプロイ
      # ===========================
      - name: 📦 Install CMS dependencies
        working-directory: ./frontend/cms
        run: npm ci
      
      - name: 🔧 Create Production .env.production for CMS
        working-directory: ./frontend/cms
        run: |
          cat > .env.production << EOF
          VITE_API_BASE_URL=${{ secrets.PRODUCTION_API_URL }}
          VITE_GOOGLE_MAPS_API_KEY=AIzaSyC1LrD7xMN_sLZ5iELaLpPzXPeQeEoH6pY
          VITE_APP_ENV=production
          VITE_GPS_UPDATE_INTERVAL=5000
          VITE_DEBUG=false
          VITE_LOG_LEVEL=error
          EOF
      
      - name: 🏗️ Build CMS
        working-directory: ./frontend/cms
        run: npm run build
      
      - name: 🚀 Deploy CMS to Production
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_PRIVATE_KEY }}
          source: "frontend/cms/dist/*"
          target: "/tmp/cms-deploy/"
          strip_components: 3
      
      - name: 📂 Update CMS on Production
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_PRIVATE_KEY }}
          script: |
            rm -rf ~/projects/dump-tracker/frontend/cms/dist/*
            cp -r /tmp/cms-deploy/* ~/projects/dump-tracker/frontend/cms/dist/
            chmod -R 755 ~/projects/dump-tracker/frontend/cms/dist
            rm -rf /tmp/cms-deploy
            sudo systemctl reload nginx
            echo "✅ CMS deployed to Production"
      
      - name: ✅ Deployment Complete
        run: |
          echo "🎉 Production deployment completed successfully!"
          echo "📱 Mobile: https://dump-tracker.ddns.net/"
          echo "💼 CMS: https://dump-tracker.ddns.net:3003/"
          echo "📚 API Docs: https://dump-tracker.ddns.net/docs/"
          echo ""
          echo "📸 Pre-deployment snapshot was created for rollback"