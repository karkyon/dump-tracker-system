name: 🏭 Deploy to Production

on:
  workflow_dispatch:
  push:
    branches: ['release/**']

jobs:
  deploy-production:
    name: 🚀 Deploy to Production Environment
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # ===========================
      # Backend デプロイ
      # ===========================
      - name: 📦 Install backend dependencies
        working-directory: ./backend
        run: npm ci

      - name: 🏗️ Build backend
        working-directory: ./backend
        run: npm run build

      - name: 🚀 Deploy backend to Production
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          source: "backend/dist/*,backend/package*.json,backend/prisma/schema.camel.prisma"
          target: "/tmp/backend-deploy/"
          strip_components: 1

      - name: 📂 Update backend on Production
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          script: |
            cd ~/projects/dump-tracker/backend
            rm -rf dist
            cp -r /tmp/backend-deploy/dist .
            cp /tmp/backend-deploy/package*.json .
            mkdir -p prisma
            cp /tmp/backend-deploy/schema.camel.prisma prisma/ 2>/dev/null || true
            export NVM_DIR="$HOME/.nvm" && source "$NVM_DIR/nvm.sh"
            npm ci
            npx prisma generate --schema=./prisma/schema.camel.prisma 2>/dev/null || true
            npx prisma db push --schema=./prisma/schema.camel.prisma 2>/dev/null || true
            sudo -u postgres psql dump_tracker_prod -c "GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO dump_tracker_user;" 2>/dev/null || true
            sudo -u postgres psql dump_tracker_prod -c "GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO dump_tracker_user;" 2>/dev/null || true
            sudo systemctl restart dump-tracker-backend
            sleep 3
            sudo systemctl is-active dump-tracker-backend && echo "OK"
            sudo chown -R karkyon_dump:karkyon_dump ~/projects/dump-tracker/backend/logs/ 2>/dev/null || true
            rm -rf /tmp/backend-deploy

      # ===========================
      # Mobile Frontend デプロイ
      # ===========================
      - name: 📦 Install mobile dependencies
        working-directory: ./frontend/mobile
        run: npm ci

      - name: 🔧 Create Production .env for Mobile
        working-directory: ./frontend/mobile
        run: |
          cat > .env.production << EOF
          VITE_API_BASE_URL=/api/v1
          VITE_GOOGLE_MAPS_API_KEY=AIzaSyCpQGN2eC7q0jE-wZdVO_NauO5_NgmVerk
          VITE_APP_ENV=production
          VITE_GOOGLE_MAP_ID=793b2cb3013694b0700a2152
          VITE_DEBUG=false
          VITE_LOG_LEVEL=error
          EOF

      - name: 🏗️ Build mobile app
        working-directory: ./frontend/mobile
        run: |
          mkdir -p .cert
          touch .cert/localhost-key.pem
          touch .cert/localhost-cert.pem
          sed -i 's/useRef<number | null>/useRef<any>/g' src/pages/OperationMain.tsx || true
          npm run build

      - name: 🚀 Deploy mobile to Production
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          source: "frontend/mobile/dist/*"
          target: "/tmp/mobile-deploy/"
          strip_components: 3

      - name: 📂 Update mobile on Production
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          script: |
            rm -rf ~/projects/dump-tracker/frontend/mobile/dist/*
            cp -r /tmp/mobile-deploy/* ~/projects/dump-tracker/frontend/mobile/dist/
            chmod -R 755 ~/projects/dump-tracker/frontend/mobile/dist
            rm -rf /tmp/mobile-deploy
            echo "✅ Mobile deployed to Production"

      # ===========================
      # CMS Frontend デプロイ
      # ===========================
      - name: 📦 Install CMS dependencies
        working-directory: ./frontend/cms
        run: npm ci

      - name: 🔧 Create Production .env for CMS
        working-directory: ./frontend/cms
        run: |
          cat > .env.production << EOF
          VITE_API_BASE_URL=/api/v1
          VITE_GOOGLE_MAPS_API_KEY=AIzaSyCpQGN2eC7q0jE-wZdVO_NauO5_NgmVerk
          VITE_APP_ENV=production
          VITE_GPS_UPDATE_INTERVAL=5000
          VITE_DEBUG=false
          VITE_LOG_LEVEL=error
          EOF

      - name: 🏗️ Build CMS
        working-directory: ./frontend/cms
        run: npm run build

      - name: 🚀 Deploy CMS to Production
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          source: "frontend/cms/dist/*"
          target: "/tmp/cms-deploy/"
          strip_components: 3

      - name: 📂 Update CMS on Production
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          script: |
            rm -rf ~/projects/dump-tracker/frontend/cms/dist/*
            cp -r /tmp/cms-deploy/* ~/projects/dump-tracker/frontend/cms/dist/
            chmod -R 755 ~/projects/dump-tracker/frontend/cms/dist
            rm -rf /tmp/cms-deploy
            echo "✅ CMS deployed to Production"

      - name: ✅ Deployment Complete
        run: |
          echo "🎉 Production deployment completed successfully!"
          echo "📱 Mobile: https://dump-tracker.ddns.net/"
          echo "💼 CMS: https://dump-tracker.ddns.net:3003/"
