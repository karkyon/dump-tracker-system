name: 🧪 Deploy to Staging

on:
  push:
    branches: [main]

jobs:
  deploy-staging:
    name: 🚀 Deploy to Staging Environment
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v3
      
      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      # ===========================
      # Backend デプロイ
      # ===========================
      - name: 📦 Install backend dependencies
        working-directory: ./backend
        run: npm ci
      
      - name: 🏗️ Build backend
        working-directory: ./backend
        run: npm run build
      
      - name: 🚀 Deploy backend to Staging
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}
          source: "backend/dist/*,backend/package*.json,backend/prisma/schema.camel.prisma"
          target: "/tmp/backend-deploy/"
          strip_components: 1
      
      - name: 📂 Update backend on Staging
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}
          script: |
            cd ~/projects/dump-tracker/backend
            rm -rf dist
            cp -r /tmp/backend-deploy/dist .
            cp /tmp/backend-deploy/package*.json .
            mkdir -p prisma
            cp /tmp/backend-deploy/schema.camel.prisma prisma/ 2>/dev/null || true
            export NVM_DIR="$HOME/.nvm" && source "$NVM_DIR/nvm.sh"
            npm ci --production
            npx prisma generate --schema=./prisma/schema.camel.prisma 2>/dev/null || true
            npx prisma db push --schema=./prisma/schema.camel.prisma 2>/dev/null || true
            # ✅ テーブル権限付与（db push後はownerがpostgresになる場合があるため）
            sudo -u postgres psql dump_tracker_staging -c "GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO dump_tracker_user;" 2>/dev/null || true
            sudo -u postgres psql dump_tracker_staging -c "GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO dump_tracker_user;" 2>/dev/null || true
            rm -rf /tmp/backend-deploy
            rm -rf /tmp/backend-deploy
            nohup bash -c 'sleep 3 && pkill -f "ts-node src/index.ts" 2>/dev/null; sleep 2; cd ~/projects/dump-tracker/backend && nohup npx ts-node src/index.ts >> logs/combined.log 2>&1 &' > /tmp/restart.log 2>&1 &
            disown
            echo "✅ Backend restart scheduled"

      # ===========================
      # Mobile Frontend デプロイ
      # ===========================
      - name: 📦 Install mobile dependencies
        working-directory: ./frontend/mobile
        run: npm ci
      
      - name: 🔧 Create Staging .env.production for Mobile
        working-directory: ./frontend/mobile
        run: |
          cat > .env.production << EOF
          VITE_API_BASE_URL=${{ secrets.STAGING_API_URL }}
          VITE_GOOGLE_MAPS_API_KEY=AIzaSyCpQGN2eC7q0jE-wZdVO_NauO5_NgmVerk
          VITE_APP_ENV=staging
          EOF
      
      - name: 🏗️ Build mobile app
        working-directory: ./frontend/mobile
        run: |
          mkdir -p .cert
          touch .cert/localhost-key.pem
          touch .cert/localhost-cert.pem
          sed -i 's/useRef<number | null>/useRef<any>/g' src/pages/OperationMain.tsx || true
          npm run build
      
      - name: 🚀 Deploy mobile to Staging
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}
          source: "frontend/mobile/dist/*"
          target: "/tmp/mobile-deploy/"
          strip_components: 3
      
      - name: 📂 Update mobile on Staging
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}
          script: |
            rm -rf ~/projects/dump-tracker/frontend/mobile/dist/*
            cp -r /tmp/mobile-deploy/* ~/projects/dump-tracker/frontend/mobile/dist/
            chmod -R 755 ~/projects/dump-tracker/frontend/mobile/dist
            rm -rf /tmp/mobile-deploy
            echo "✅ Mobile deployed to Staging"

      # ===========================
      # CMS Frontend デプロイ
      # ===========================
      - name: 📦 Install CMS dependencies
        working-directory: ./frontend/cms
        run: npm ci
      
      - name: 🔧 Create Staging .env.production for CMS
        working-directory: ./frontend/cms
        run: |
          cat > .env.production << EOF
          VITE_API_BASE_URL=${{ secrets.STAGING_API_URL }}
          VITE_GOOGLE_MAPS_API_KEY=AIzaSyCpQGN2eC7q0jE-wZdVO_NauO5_NgmVerk
          VITE_APP_ENV=staging
          VITE_GPS_UPDATE_INTERVAL=5000
          VITE_DEBUG=false
          VITE_LOG_LEVEL=error
          EOF
      
      - name: 🏗️ Build CMS
        working-directory: ./frontend/cms
        run: npm run build
      
      - name: 🚀 Deploy CMS to Staging
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}
          source: "frontend/cms/dist/*"
          target: "/tmp/cms-deploy/"
          strip_components: 3
      
      - name: 📂 Update CMS on Staging
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}
          script: |
            rm -rf ~/projects/dump-tracker/frontend/cms/dist/*
            cp -r /tmp/cms-deploy/* ~/projects/dump-tracker/frontend/cms/dist/
            chmod -R 755 ~/projects/dump-tracker/frontend/cms/dist
            rm -rf /tmp/cms-deploy
            sudo systemctl reload nginx
            echo "✅ CMS deployed to Staging"
      
      - name: ✅ Deployment Complete
        run: |
          echo "🎉 Staging deployment completed successfully!"
          echo "📱 Mobile: https://dumptracker-s.ddns.net/"
          echo "💼 CMS: https://dumptracker-s.ddns.net:3003/"
          echo "📚 API Docs: https://dumptracker-s.ddns.net/docs/"